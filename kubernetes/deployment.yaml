apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops-unified-deployment
  labels:
    app: mlops-unified
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mlops-unified
  template:
    metadata:
      labels:
        app: mlops-unified
    spec:
      containers:
      - name: mlops-api
        image: mlops-travel-system-v2:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "api/app.py"]
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      - name: mlops-ui
        image: mlops-travel-system-v2:latest
        imagePullPolicy: IfNotPresent
        command: ["streamlit", "run", "app/ui.py", "--server.port=8501", "--server.address=0.0.0.0"]
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
